name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24', '1.26']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      
      - name: Install Capstone
        run: |
          sudo apt-get update
          sudo apt-get install -y libcapstone-dev
      
      - name: Verify dependencies
        run: go mod verify
      
      - name: Build
        run: go build -v ./...
      
      - name: Build cmd/sedec
        run: go build -v -o sedec ./cmd/sedec

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - name: Install Capstone
        run: |
          sudo apt-get update
          sudo apt-get install -y libcapstone-dev
      
      - name: Install Zig for cross-compilation
        run: |
          wget -q https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          tar -xf zig-x86_64-linux-0.15.2.tar.xz
          sudo mv zig-x86_64-linux-0.15.2 /usr/local/zig
          echo "/usr/local/zig" >> $GITHUB_PATH
      
      - name: Build test binaries
        run: |
          cd pkg/binary/testdata
          mkdir -p binary
          gcc -o binary/test_elf_x64 test_elf.c -O0 -g
          /usr/local/zig/zig cc -target x86_64-windows -o binary/test_pe_x64.exe test_pe.c -O0
          /usr/local/zig/zig cc -target x86_64-macos -o binary/test_macho_x64 test_elf.c -O0
          ls -lh binary/
          cd ../../..
      
      - name: Run tests
        run: go test -v -race -timeout 10m ./...
      
      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - name: Install Capstone
        run: |
          sudo apt-get update
          sudo apt-get install -y libcapstone-dev
      
      - name: Install Zig for cross-compilation
        run: |
          wget -q https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          tar -xf zig-x86_64-linux-0.15.2.tar.xz
          sudo mv zig-x86_64-linux-0.15.2 /usr/local/zig
          echo "/usr/local/zig" >> $GITHUB_PATH
      
      - name: Build test binaries
        run: |
          cd pkg/binary/testdata
          mkdir -p binary
          gcc -o binary/test_elf_x64 test_elf.c -O0 -g
          /usr/local/zig/zig cc -target x86_64-windows -o binary/test_pe_x64.exe test_pe.c -O0
          /usr/local/zig/zig cc -target x86_64-macos -o binary/test_macho_x64 test_elf.c -O0
          cd ../../..
      
      - name: Generate coverage report
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out
      
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 40.0" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below threshold 40%"
            exit 1
          fi