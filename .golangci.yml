version: "2"

run:
  timeout: 15m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
    - unconvert
    - unparam
    - goconst
    - gocyclo
    - nestif
    - whitespace
    - dupl
    - nakedret
    - goprintffuncname
    - nolintlint
    - prealloc
    - predeclared
    - gosec
    - bodyclose
    - errname
    - errorlint
    - err113
    - rowserrcheck
    - sqlclosecheck
    - exhaustive
    - forcetypeassert
    - godox
    - gomoddirectives
    - maintidx
    - makezero
    - musttag
    - nilnil
    - noctx
    - nosprintfhostport
    - reassign
    - testableexamples
    - thelper
    - usestdlibvars
    - wastedassign
    - gocheckcompilerdirectives

  settings:
    goconst:
      min-len: 3
      min-occurrences: 2

    exhaustive:
      default-signifies-exhaustive: true
      explicit-exhaustive-switch: false

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    nakedret:
      max-func-lines: 20

    dupl:
      threshold: 150

  exclusions:
    rules:
      # exclude test files from most linters
      - path: '_test\.go'
        linters:
          - gocyclo
          - errcheck
          - gosec
          - goconst
          - dupl
          - err113
          - exhaustive
          - lll
          - godot
          - thelper
          - nolintlint
          - revive
          - gocritic
          - govet
          - nestif
      # exclude doc files
      - path: 'doc\.go'
        linters:
          - revive
          - godot
      # exclude mock files
      - path: 'mock.*\.go'
        linters:
          - revive
      # exclude cgo files from certain checks
      - path: 'capstone\.go'
        linters:
          - gocritic
          - nolintlint
          - govet
          - godot

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
