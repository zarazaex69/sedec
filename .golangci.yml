version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
    - unconvert
    - unparam
    - goconst
    - gocyclo
    - nestif
    - whitespace
    - dupl
    - nakedret
    - goprintffuncname
    - nolintlint
    - prealloc
    - predeclared
    - gosec
    - bodyclose
    - errname
    - errorlint
    - wrapcheck
    - err113
    - rowserrcheck
    - sqlclosecheck
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - godot
    - godox
    - gomoddirectives
    - lll
    - maintidx
    - makezero
    - musttag
    - nilnil
    - noctx
    - nosprintfhostport
    - reassign
    - testableexamples
    - thelper
    - usestdlibvars
    - wastedassign
    - gocheckcompilerdirectives

settings:
  govet:
    enable-all: true
    settings:
      shadow:
        strict: true

  errcheck:
    check-type-assertions: true
    check-blank: true

  staticcheck:
    checks: ["all"]

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - commentedOutCode

  revive:
    severity: error
    rules:
      - name: exported
        severity: error
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: var-naming
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-strings
      - name: errorf
      - name: increment-decrement
      - name: var-declaration
      - name: range-val-in-closure
      - name: range-val-address
      - name: waitgroup-by-value
      - name: atomic
      - name: empty-lines
      - name: call-to-gc
      - name: duplicated-imports
      - name: import-shadowing
      - name: bare-return
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
      - name: cognitive-complexity
        arguments: [10]
      - name: function-length
        arguments: [50, 100]
      - name: argument-limit
        arguments: [5]
      - name: max-public-structs
        arguments: [10]

  gocyclo:
    min-complexity: 10

  nestif:
    min-complexity: 4

  gosec:
    excludes:
      - G304
    config:
      G101:
        pattern: "(?i)passwd|pass|password|pwd|secret|token|key|api"

  goconst:
    min-len: 3
    min-occurrences: 2

  nakedret:
    max-func-lines: 20

  lll:
    line-length: 120

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(

  exhaustive:
    default-signifies-exhaustive: true

  maintidx:
    under: 20

  godot:
    scope: all
    capital: true

  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true

exclusions:
  warn-unused: false
  rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
        - goconst
        - dupl
        - wrapcheck
        - exhaustruct
        - err113
    - path: doc\.go
      linters:
        - revive
    - path: mock.*\.go
      linters:
        - exhaustruct
        - wrapcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true